; ==========================================================
; 5) 国家/地区测速组（url-test → smart）
;    smart：节点在线不测速，挂了才测，切换更快、不打断连接
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`smart`.*`https://www.gstatic.com/generate_204`300
custom_proxy_group=🇭🇰 HK`smart`(?i)(🇭🇰|香港|\\bHK\\b|hongkong)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇹🇼 TW`smart`(?i)(🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇯🇵 JP`smart`(?i)(🇯🇵|日本|\\bJP\\b|tokyo|osaka)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇸🇬 SG`smart`(?i)(🇸🇬|新加坡|\\bSG\\b|singapore)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇺🇸 US`smart`(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(🇭🇰|香港|\\bHK\\b|hong\\s*kong|🇯🇵|日本|\\bJP\\b|tokyo|osaka|🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet|🇸🇬|新加坡|\\bSG\\b|singapore|🇺🇸|美国|\\bUS\\b|united\\s*states|los\\s*angeles|san\\s*jose|seattle|new\\s*york)).*
