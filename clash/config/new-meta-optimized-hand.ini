[custom]
; ==========================================================
; 方案 B · 优化版（url-test → smart + 策略组排序 + 规则顺序修复）
; 优化内容：
;   1. url-test → smart（节点按需测速，不打断现有连接）
;   2. 策略组候选项：♻️ 自动选择置顶，常用节点优先
;   3. 漏网之鱼：DIRECT 优先于 🌐 Default（漏网默认直连）
;   4. 非标端口规则移至 FINAL 之前
;   5. 删除冗余 GEOSITE 规则（private/google-cn 已包含在 cn 里）
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website


; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================


; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=🚀 代理,clash-domain:https://raw.githubusercontent.com/MangoJack/waibsets/refs/heads/main/clash/rulesets/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 代理,clash-classic:https://raw.githubusercontent.com/MangoJack/waibsets/refs/heads/main/clash/rulesets/Custom_Proxy_Classical_IP.yaml,28800

; --- 私网直连 ---
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 --- 
ruleset=🎯 全球直连,clash-domain:https://raw.githubusercontent.com/MangoJack/waibsets/refs/heads/main/clash/rulesets/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://raw.githubusercontent.com/MangoJack/waibsets/refs/heads/main/clash/rulesets/Custom_Direct_Classical_IP.yaml,28800

; --- 国内直连（GEOSITE,cn 已包含 private/google-cn，不需要单独列出）---
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

; --- 核心应用（不需要） ---

; --- 非标端口（移至 FINAL 之前，确保能正确匹配）---
ruleset=🔀 非标端口,clash-classic:https://raw.githubusercontent.com/MangoJack/waibsets/refs/heads/main/clash/rulesets/Custom_Port_Direct.yaml,28800

; --- 其他补充 ---
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🚀 代理,[]GEOSITE,geolocation-!cn
ruleset=🎯 全球直连,[]GEOIP,cn

; --- 最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL


; ==========================================================
; 2) 应用分流策略组（不需要）
;    排序原则：♻️ 自动选择 → 五区节点 → 🧊 冷门 → 🧭 手动 → 🌐 Default → DIRECT
; ==========================================================

; ==========================================================
; 3) Default / 漏网之鱼（DIRECT 优先，漏网默认直连）
; ==========================================================
custom_proxy_group=🚀 代理`select`[]🧭 手动选择`[]♻️ 自动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 代理
custom_proxy_group=🔀 非标端口`select`[]🚀 代理`[]🎯 全球直连
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 代理

; ==========================================================
; 4) 非标端口
; ==========================================================


; ==========================================================
; 5) 国家/地区测速组（url-test → smart）
;    smart：节点在线不测速，挂了才测，切换更快、不打断连接
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`smart`.*`https://www.gstatic.com/generate_204`300
custom_proxy_group=🇭🇰 HK`smart`(?i)(🇭🇰|香港|\\bHK\\b|hongkong)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇹🇼 TW`smart`(?i)(🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇯🇵 JP`smart`(?i)(🇯🇵|日本|\\bJP\\b|tokyo|osaka)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇸🇬 SG`smart`(?i)(🇸🇬|新加坡|\\bSG\\b|singapore)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🇺🇸 US`smart`(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)`http://www.gstatic.com/generate_204`300
custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(🇭🇰|香港|\\bHK\\b|hong\\s*kong|🇯🇵|日本|\\bJP\\b|tokyo|osaka|🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet|🇸🇬|新加坡|\\bSG\\b|singapore|🇺🇸|美国|\\bUS\\b|united\\s*states|los\\s*angeles|san\\s*jose|seattle|new\\s*york)).*
