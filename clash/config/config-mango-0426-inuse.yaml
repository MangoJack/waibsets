  onedrive_domain:   {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-onedrive.mrs"}
  microsoft_domain:  {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-microsoft.mrs"}
  apple_domain:      {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-apple.mrs"}
  speedtest_domain:  {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-speedtest.mrs"}
