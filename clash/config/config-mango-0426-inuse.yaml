# DNS防泄露版本 · SmartOnly 修正版
# 基于 configdns-SmartOnly.yaml，修复兜底链：去除盲目全量节点兜底
# 修正：去掉所有应用组引用链中的「🌐 全部节点」盲目兜底，改为纯 smart 链
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅
proxy-providers:
#在url处填写订阅节点链接
  Airport1:
    url: "..."
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"

# 出站策略
# 兜底链原则：优先 ♻️ smart 智能选 → 最终 ♻️ 自动选择（测全量）→ 手动节点 → DIRECT
# 不再使用「🌐 全部节点」作为盲目兜底（它只应作为手动选择入口，不应自动穿透至此）
proxy-groups:
  - {name: 🌐 全部节点, type: select, include-all: true}  # 仅手动选择用，不在自动兜底链中
  # === 应用策略组 ===
  - {name: 🚀 默认代理, type: select, proxies: [🌐 全部节点, ♻️ 香港自动, ♻️ 美国自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 直连]}
  - {name: 📹 YouTube, type: select, proxies: [🚀 默认代理, ♻️ 美国自动, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 🍎 Apple, type: select, proxies: [直连, 🚀 默认代理, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 🌐 全部节点]}
  - {name: 🍀 Google, type: select, proxies: [🚀 默认代理, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 🤖 ChatGPT, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 香港自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 👨🏿‍💻 GitHub, type: select, proxies: [🚀 默认代理, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 🐬 OneDrive, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 香港自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 🪟 Microsoft, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 香港自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 🎵 TikTok, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 香港自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 📲 Telegram, type: select, proxies: [🚀 默认代理, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 🎥 NETFLIX, type: select, proxies: [🚀 默认代理, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇸🇬 狮城节点, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 💶 PayPal, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 香港自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 加拿大自动, ♻️ 自动选择, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, ♻️ 自动选择, ♻️ 香港自动, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 加拿大自动, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇨🇦 加拿大节点, 🌐 全部节点, 直连]}

  # === 基础智能策略组（smart，自动选最优节点）===
  - {name: ♻️ 香港自动, type: smart, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|加)).)*$"}
  - {name: ♻️ 日本自动, type: smart, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|加)).)*$"}
  - {name: ♻️ 狮城自动, type: smart, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|日|美|加)).)*$"}
  - {name: ♻️ 美国自动, type: smart, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新|加)).)*$"}
  - {name: ♻️ 加拿大自动, type: smart, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(加拿大|加|CA|(?i)Canada))^((?!(港|台|日|韩|新|美)).)*$"}
  - {name: ♻️ 自动选择, type: smart, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(直连)).)*$"}

  # === 手动节点选择组 ===
  - {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|加)).)*$"}
  - {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|加)).)*$"}
  - {name: 🇸🇬 狮城节点, type: select, include-all: true, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美|加)).)*$"}
  - {name: 🇺🇲 美国节点, type: select, include-all: true, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日|加)).)*$"}
  - {name: 🇨🇦 加拿大节点, type: select, include-all: true, filter: "(?=.*(加拿大|加|CA|(?i)Canada))^((?!(港|台|日|韩|新|美)).)*$"}

# 规则匹配
rules:
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连
  - DOMAIN-SUFFIX,qichiyu.com,🚀 默认代理
  - RULE-SET,proxylite,🚀 默认代理
  - RULE-SET,ai,🤖 ChatGPT
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,apple_ip,🍎 Apple
  - RULE-SET,google_ip,🍀 Google
  - RULE-SET,netflix_ip,🎥 NETFLIX
  - RULE-SET,telegram_ip,📲 Telegram
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  - MATCH,🐟 漏网之鱼

# 规则集
## type：可选http/file/inline  behavior：可选domain/ipcidr/classical format：可选yaml/text/mrs
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
rule-providers:
  # ---- 域名类 (behavior: domain) ----
  proxylite:         {<<: *class, url: "https://raw.githubusercontent.com/MangoJack/waibsets/refs/heads/main/clash/rulesets/qichiyu-proxy.list"}
  fakeipfilter_domain: {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/fakeip-filter.mrs"}
  private_domain:    {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-private.mrs"}
  ai:                {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-ai-!cn.mrs"}
  youtube_domain:    {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-youtube.mrs"}
  google_domain:     {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-google.mrs"}
