  telegram_domain:   {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-telegram.mrs"}
  netflix_domain:    {<<: *domain, url: "https://raw.githubusercontent.com/MangoJack/waibsets/main/clash/rulesets/meta-geosite-netflix.mrs"}
